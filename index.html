<!DOCTYPE html>
<html>
<head>
    <title>March 23 💛</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom right, #f8cdda, #a1c4fd);
            text-align: center;
            font-family: 'Quicksand', sans-serif;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 25px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 700px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            margin-bottom: 25px;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 30px;
            background: white;
            color: #ff69b4;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: #ff69b4;
            color: white;
        }

        iframe {
            margin-top: 25px;
            border-radius: 20px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Welcome to Our Little Universe ✨</h1>
        <p>You found the hidden portal 💖</p>

        <button onclick="showVideo()">Enter</button>

        <div id="videoSection" style="display:none;">
            <iframe width="100%" height="350"
            src="https://www.youtube.com/embed/oafxkMv4xnc"
            frameborder="0"
            allowfullscreen>
            </iframe>

            <p>And this is just the beginning… 💛</p>
        </div>
    </div>

    <script>
        function showVideo() {
            document.getElementById("videoSection").style.display = "block";
        }
    </script>

</body>
</html>
