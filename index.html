<!DOCTYPE html>
<html>
<head>
<title>Under This Same Night Sky 🌙</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    font-family:'Quicksand',sans-serif;
    background:
        radial-gradient(circle at 70% 20%, rgba(255,200,120,0.15), transparent 40%),
        radial-gradient(circle at 50% 80%, rgba(0,80,180,0.25), transparent 60%),
        linear-gradient(to bottom, #071428 0%, #030712 60%, #000 100%);
    color:white;
}

/* ===== HD WARM MOON ===== */
.moon{
    position:absolute;
    top:80px;
    right:140px;
    width:260px;
    height:260px;
    border-radius:50%;
    background:url("https://upload.wikimedia.org/wikipedia/commons/4/4c/FullMoon2010.jpg") center/cover;
    box-shadow:
        0 0 40px rgba(255,220,150,0.8),
        0 0 120px rgba(255,200,120,0.6),
        0 0 200px rgba(255,180,90,0.3);
    filter: hue-rotate(-20deg) saturate(120%);
}

/* ===== BALANCED STARS ===== */
.star{
    position:absolute;
    border-radius:50%;
    background:white;
    animation: twinkle 3s infinite ease-in-out alternate;
}

@keyframes twinkle{
    from{
        opacity:0.4;
        box-shadow:0 0 2px white;
    }
    to{
        opacity:1;
        box-shadow:0 0 8px white, 0 0 18px #8fd3ff;
    }
}

/* ===== DREAMY CLOUDS ===== */
.cloud{
    position:absolute;
    width:900px;
    opacity:0.18;
    filter: blur(6px);
    animation: drift 180s linear infinite;
}

.cloud2{
    top:200px;
    left:-1000px;
}

.cloud1{
    top:50px;
    left:-800px;
}

@keyframes drift{
    from{ transform:translateX(0);}
    to{ transform:translateX(250vw);}
}

/* ===== GLASS CARD ===== */
.container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,30,0.55);
    backdrop-filter:blur(12px);
    padding:70px;
    border-radius:25px;
    text-align:center;
    width:80%;
    max-width:750px;
    box-shadow:0 0 80px rgba(0,0,0,0.7);
}

h1{
    font-family:'Playfair Display',serif;
    font-size:52px;
    letter-spacing:1px;
    text-shadow:0 0 25px rgba(255,255,255,0.7);
}

.typing{
    font-size:20px;
    margin:20px 0 35px;
    color:#cfe9ff;
}

button{
    padding:14px 40px;
    font-size:18px;
    border-radius:40px;
    border:none;
    background:rgba(255,255,255,0.85);
    cursor:pointer;
    transition:0.3s ease;
}

button:hover{
    background:white;
    transform:scale(1.05);
}

iframe{
    margin-top:35px;
    border-radius:18px;
}
</style>
</head>

<body>

<div class="moon"></div>

<!-- Soft Dreamy Clouds -->
<img src="https://pngimg.com/uploads/cloud/cloud_PNG16.png" class="cloud cloud1">
<img src="https://pngimg.com/uploads/cloud/cloud_PNG16.png" class="cloud cloud2">

<!-- Balanced Stars -->
<script>
for(let i=0;i<160;i++){
    let star=document.createElement("div");
    star.className="star";

    let size=Math.random()*2+1;
    star.style.width=size+"px";
    star.style.height=size+"px";
    star.style.top=Math.random()*100+"vh";
    star.style.left=Math.random()*100+"vw";

    star.style.animationDuration=(Math.random()*2+2)+"s";

    document.body.appendChild(star);
}
</script>

<div class="container">
    <h1>Under This Same Night Sky 🌙</h1>
    <div class="typing" id="typingText"></div>

    <button onclick="showVideo()">Enter</button>

    <div id="videoSection" style="display:none;">
        <iframe width="100%" height="400"
        src="https://www.youtube.com/embed/oafxkMv4xnc"
        frameborder="0"
        allowfullscreen>
        </iframe>
    </div>
</div>

<script>
const text="Somewhere under these stars, it's always us ✨";
let i=0;
function typeEffect(){
    if(i<text.length){
        document.getElementById("typingText").innerHTML+=text.charAt(i);
        i++;
        setTimeout(typeEffect,50);
    }
}
typeEffect();

function showVideo(){
    document.getElementById("videoSection").style.display="block";
}
</script>

</body>
</html>
