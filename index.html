<!DOCTYPE html>
<html>
<head>
<title>Under This Same Night Sky 🌙</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    font-family:'Quicksand',sans-serif;
    background:
        radial-gradient(circle at top, #0a1f3d 0%, #030712 60%, #000000 100%);
    color:white;
}

/* ===== MOON (TOP RIGHT, BIGGER, CLEAN) ===== */
.moon{
    position:absolute;
    top:60px;
    right:80px;
    width:260px;              /* Increased size */
    height:auto;
    filter: drop-shadow(0 0 15px rgba(255,255,255,0.25));
    z-index:1;
}

/* ===== STARS ===== */
.star{
    position:absolute;
    background:white;
    border-radius:50%;
    animation: twinkle 3s infinite ease-in-out alternate;
}

@keyframes twinkle{
    from{opacity:0.4;}
    to{opacity:1;}
}

/* ===== GLASS CARD ===== */
.container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(5,15,35,0.8);
    backdrop-filter:blur(18px);
    padding:70px;
    border-radius:28px;
    text-align:center;
    width:80%;
    max-width:750px;
    box-shadow:0 0 120px rgba(0,0,0,0.9);
    z-index:2;
}

h1{
    font-family:'Playfair Display',serif;
    font-size:50px;
    letter-spacing:1px;
    text-shadow:0 0 18px rgba(255,255,255,0.5);
}

.typing{
    font-size:20px;
    margin:20px 0 35px;
    color:#cfe9ff;
}

/* ===== BUTTON ===== */
button{
    padding:14px 42px;
    font-size:18px;
    border-radius:40px;
    border:none;
    background:linear-gradient(45deg,#ffffff,#e6f2ff);
    cursor:pointer;
    transition:0.3s ease;
}

button:hover{
    transform:scale(1.07);
    box-shadow:0 0 20px rgba(255,255,255,0.6);
}

iframe{
    margin-top:35px;
    border-radius:18px;
}
</style>
</head>

<body>

<!-- 🌙 Crescent Moon -->
<img src="moon.png" class="moon">

<!-- ⭐ Stars -->
<script>
for(let i=0;i<120;i++){
    let star=document.createElement("div");
    star.className="star";

    let size=Math.random()*2+1;
    star.style.width=size+"px";
    star.style.height=size+"px";
    star.style.top=Math.random()*100+"vh";
    star.style.left=Math.random()*100+"vw";

    document.body.appendChild(star);
}
</script>

<div class="container">
    <h1>Under This Same Night Sky 🌙</h1>
    <div class="typing" id="typingText"></div>

    <button onclick="showVideo()">Enter</button>

    <div id="videoSection" style="display:none;">
        <iframe width="100%" height="400"
        src="https://www.youtube.com/embed/oafxkMv4xnc"
        frameborder="0"
        allowfullscreen>
        </iframe>
    </div>
</div>

<script>
const text="Somewhere under these stars, it's always us ✨";
let i=0;
function typeEffect(){
    if(i<text.length){
        document.getElementById("typingText").innerHTML+=text.charAt(i);
        i++;
        setTimeout(typeEffect,50);
    }
}
typeEffect();

function showVideo(){
    document.getElementById("videoSection").style.display="block";
}
</script>

</body>
</html>
