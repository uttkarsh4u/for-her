<!DOCTYPE html>
<html>
<head>
    <title>March 23 🌙</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            color: white;
        }

        /* Realistic Night Background */
        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1920&q=80") no-repeat center center/cover;
            z-index: -3;
        }

        /* Dark overlay for cinematic feel */
        body::after {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 20, 0.5);
            z-index: -2;
        }

        /* Big Glowing Moon */
        .moon {
            position: absolute;
            top: 80px;
            right: 120px;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, #fff 0%, #ddd 40%, #bbb 70%);
            border-radius: 50%;
            box-shadow: 0 0 80px rgba(255,255,255,0.8);
            opacity: 0.9;
        }

        /* Floating clouds */
        .cloud {
            position: absolute;
            width: 500px;
            opacity: 0.3;
            animation: moveClouds 90s linear infinite;
        }

        .cloud1 { top: 200px; left: -600px; }
        .cloud2 { top: 400px; left: -800px; animation-delay: 30s; }

        @keyframes moveClouds {
            from { transform: translateX(0); }
            to { transform: translateX(200vw); }
        }

        .container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0,0,0,0.4);
            padding: 60px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            width: 80%;
            max-width: 700px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
        }

        .typing {
            font-size: 20px;
            margin-top: 10px;
            margin-bottom: 30px;
            color: #d0e7ff;
        }

        button {
            padding: 14px 35px;
            font-size: 18px;
            border-radius: 30px;
            border: none;
            background: rgba(255,255,255,0.8);
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: #fff;
            transform: scale(1.05);
        }

        iframe {
            margin-top: 30px;
            border-radius: 20px;
        }
    </style>
</head>

<body>

    <div class="moon"></div>

    <img src="https://pngimg.com/uploads/cloud/cloud_PNG16.png" class="cloud cloud1">
    <img src="https://pngimg.com/uploads/cloud/cloud_PNG16.png" class="cloud cloud2">

    <div class="container">
        <h1>Under This Same Night Sky 🌙</h1>
        <div class="typing" id="typingText"></div>

        <button onclick="showVideo()">Enter</button>

        <div id="videoSection" style="display:none;">
            <iframe width="100%" height="380"
            src="https://www.youtube.com/embed/oafxkMv4xnc"
            frameborder="0"
            allowfullscreen>
            </iframe>
        </div>
    </div>

    <script>
        const text = "Somewhere under these stars, it’s always us 💫";
        let i = 0;

        function typeEffect() {
            if (i < text.length) {
                document.getElementById("typingText").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeEffect, 50);
            }
        }
        typeEffect();

        function showVideo() {
            document.getElementById("videoSection").style.display = "block";
        }
    </script>

</body>
</html>
