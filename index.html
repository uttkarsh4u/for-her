<!DOCTYPE html>
<html>
<head>
    <title>March 23 💛</title>
    <style>
        body {
            background: linear-gradient(to right, #fbc2eb, #a6c1ee);
            text-align: center;
            font-family: Arial, sans-serif;
            color: white;
            padding: 50px;
        }

        h1 {
            font-size: 40px;
        }

        p {
            font-size: 20px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            background-color: white;
            color: #ff69b4;
            cursor: pointer;
        }

        video {
            margin-top: 30px;
            border-radius: 20px;
            width: 80%;
            max-width: 600px;
        }
    </style>
</head>

<body>

    <h1>Welcome to Our Little Universe ✨</h1>
    <p>You found the hidden portal 💖</p>

    <button onclick="showVideo()">Enter</button>

    <div id="videoSection" style="display:none;">
        <video controls>
            <source src="yourvideo.mp4" type="video/mp4">
        </video>
        <p>And this is just the beginning… 💛</p>
    </div>

    <script>
        function showVideo() {
            document.getElementById("videoSection").style.display = "block";
        }
    </script>

</body>
</html>
