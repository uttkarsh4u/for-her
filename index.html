<!DOCTYPE html>
<html>
<head>
    <title>March 23 💛</title>

    <!-- Cute Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom right, #f8cdda, #a1c4fd);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            padding: 50px;
            border-radius: 30px;
            text-align: center;
            width: 90%;
            max-width: 700px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            position: relative;
            z-index: 2;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            font-size: 44px;
            background: linear-gradient(45deg, #ff6ec4, #7873f5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        p {
            font-size: 18px;
            color: #ff4da6;
            margin-bottom: 25px;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 30px;
            background: white;
            color: #ff4da6;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: #ff4da6;
            color: white;
            transform: scale(1.05);
        }

        iframe {
            margin-top: 25px;
            border-radius: 20px;
        }

        /* Floating cute emojis */
        .floating {
            position: absolute;
            font-size: 25px;
            animation: float 6s infinite ease-in-out;
            opacity: 0.8;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        .heart1 { top: 10%; left: 15%; animation-delay: 0s; }
        .heart2 { top: 70%; left: 80%; animation-delay: 2s; }
        .star1 { top: 20%; left: 75%; animation-delay: 1s; }
        .star2 { top: 80%; left: 20%; animation-delay: 3s; }
    </style>
</head>

<body>

    <!-- Floating cute elements -->
    <div class="floating heart1">💖</div>
    <div class="floating heart2">✨</div>
    <div class="floating star1">🌸</div>
    <div class="floating star2">🦋</div>

    <div class="container">
        <h1>Welcome to Our Little Universe ✨</h1>
        <p>You found the hidden portal 💕</p>

        <button onclick="showVideo()">Enter</button>

        <div id="videoSection" style="display:none;">
            <iframe width="100%" height="350"
            src="https://www.youtube.com/embed/oafxkMv4xnc"
            frameborder="0"
            allowfullscreen>
            </iframe>

            <p>And this is just the beginning… 💛</p>
        </div>
    </div>

    <script>
        function showVideo() {
            document.getElementById("videoSection").style.display = "block";
        }
    </script>

</body>
</html>
