<!DOCTYPE html>
<html>
<head>
    <title>March 23 🌙</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Stars */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }

        @keyframes twinkle {
            from { opacity: 0.3; }
            to { opacity: 1; }
        }

        /* Moon */
        .moon {
            position: absolute;
            top: 60px;
            right: 80px;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle at 30% 30%, #fff, #ddd);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255,255,255,0.6);
        }

        /* Clouds */
        .cloud {
            position: absolute;
            width: 300px;
            opacity: 0.2;
            animation: moveClouds 60s linear infinite;
        }

        @keyframes moveClouds {
            from { transform: translateX(-400px); }
            to { transform: translateX(150vw); }
        }

        .container {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 25px;
            text-align: center;
            width: 90%;
            max-width: 700px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            z-index: 2;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            color: #ffd6ff;
            text-shadow: 0 0 15px rgba(255, 182, 255, 0.8);
            margin-bottom: 15px;
        }

        .typing {
            font-size: 18px;
            color: #bde0fe;
            margin-bottom: 25px;
            min-height: 25px;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 30px;
            background: #bde0fe;
            color: #14213d;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: #ffd6ff;
            transform: scale(1.05);
        }

        iframe {
            margin-top: 25px;
            border-radius: 20px;
        }

        /* Sparkle Cursor */
        .sparkle {
            position: fixed;
            pointer-events: none;
            font-size: 14px;
            animation: sparkleFade 0.8s linear forwards;
        }

        @keyframes sparkleFade {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(2); }
        }
    </style>
</head>

<body>

    <!-- Moon -->
    <div class="moon"></div>

    <!-- Moving Clouds -->
    <img src="https://pngimg.com/uploads/cloud/cloud_PNG16.png" class="cloud" style="top:100px;">
    <img src="https://pngimg.com/uploads/cloud/cloud_PNG16.png" class="cloud" style="top:300px; animation-delay:20s;">

    <!-- Random Stars -->
    <script>
        for (let i = 0; i < 80; i++) {
            let star = document.createElement("div");
            star.className = "star";
            star.style.width = star.style.height = Math.random() * 3 + "px";
            star.style.top = Math.random() * 100 + "vh";
            star.style.left = Math.random() * 100 + "vw";
            document.body.appendChild(star);
        }
    </script>

    <div class="container">
        <h1>Under This Same Night Sky 🌙</h1>
        <div class="typing" id="typingText"></div>

        <button onclick="showVideo()">Enter</button>

        <div id="videoSection" style="display:none;">
            <iframe width="100%" height="350"
            src="https://www.youtube.com/embed/oafxkMv4xnc"
            frameborder="0"
            allowfullscreen>
            </iframe>

            <p style="color:#ffd6ff;">And this is just the beginning… 💫</p>
        </div>
    </div>

    <!-- Soft Background Music -->
    <audio id="bgMusic" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8f6e4e3b3.mp3?filename=soft-piano-ambient-110624.mp3" type="audio/mp3">
    </audio>

    <script>
        // Typing effect
        const text = "You found the hidden portal 💕";
        let index = 0;

        function typeEffect() {
            if (index < text.length) {
                document.getElementById("typingText").innerHTML += text.charAt(index);
                index++;
                setTimeout(typeEffect, 50);
            }
        }

        typeEffect();

        function showVideo() {
            document.getElementById("videoSection").style.display = "block";
            document.getElementById("bgMusic").play();
        }

        // Sparkle Cursor
        document.addEventListener("mousemove", function(e) {
            const sparkle = document.createElement("div");
            sparkle.className = "sparkle";
            sparkle.style.left = e.pageX + "px";
            sparkle.style.top = e.pageY + "px";
            sparkle.innerHTML = "✨";
            document.body.appendChild(sparkle);

            setTimeout(() => {
                sparkle.remove();
            }, 800);
        });
    </script>

</body>
</html>
