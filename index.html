<!DOCTYPE html>
<html>
<head>
    <title>Under This Same Night Sky 🌙</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle at bottom, #0b1d3a 0%, #050b18 60%, #02040a 100%);
            color: white;
        }

        /* Stars */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }

        @keyframes twinkle {
            from { opacity: 0.3; }
            to { opacity: 1; }
        }

        /* Full Moon */
        .moon {
            position: absolute;
            top: 80px;
            right: 120px;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, #dddddd 50%, #bbbbbb 80%);
            border-radius: 50%;
            box-shadow: 0 0 80px rgba(255,255,255,0.9);
        }

        /* Slow Moving Clouds */
        .cloud {
            position: absolute;
            width: 600px;
            opacity: 0.15;
            animation: moveClouds 120s linear infinite;
        }

        .cloud1 { top: 150px; left: -700px; }
        .cloud2 { top: 350px; left: -900px; animation-delay: 40s; }

        @keyframes moveClouds {
            from { transform: translateX(0); }
            to { transform: translateX(200vw); }
        }

        .container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,20,0.6);
            padding: 60px;
            border-radius: 20px;
            backdrop-filter: blur(6px);
            text-align: center;
            width: 80%;
            max-width: 700px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 46px;
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
            margin-bottom: 15px;
        }

        .typing {
            font-size: 20px;
            color: #b8dfff;
            margin-bottom: 30px;
        }

        button {
            padding: 14px 35px;
            font-size: 18px;
            border-radius: 30px;
            border: none;
            background: #ffffffcc;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: white;
            transform: scale(1.05);
        }

        iframe {
            margin-top: 30px;
            border-radius: 15px;
        }
    </style>
</head>

<body>

    <!-- Moon -->
    <div class="moon"></div>

    <!-- Clouds -->
    <img src="https://pngimg.com/uploads/cloud/cloud_PNG16.png" class="cloud cloud1">
    <img src="https://pngimg.com/uploads/cloud/cloud_PNG16.png" class="cloud cloud2">

    <!-- Stars Script -->
    <script>
        for (let i = 0; i < 150; i++) {
            let star = document.createElement("div");
            star.className = "star";
            let size = Math.random() * 2 + "px";
            star.style.width = size;
            star.style.height = size;
            star.style.top = Math.random() * 100 + "vh";
            star.style.left = Math.random() * 100 + "vw";
            document.body.appendChild(star);
        }
    </script>

    <div class="container">
        <h1>Under This Same Night Sky 🌙</h1>
        <div class="typing" id="typingText"></div>

        <button onclick="showVideo()">Enter</button>

        <div id="videoSection" style="display:none;">
            <iframe width="100%" height="380"
            src="https://www.youtube.com/embed/oafxkMv4xnc"
            frameborder="0"
            allowfullscreen>
            </iframe>
        </div>
    </div>

    <script>
        const text = "Somewhere under these stars, it’s always us 💫";
        let i = 0;

        function typeEffect() {
            if (i < text.length) {
                document.getElementById("typingText").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeEffect, 50);
            }
        }
        typeEffect();

        function showVideo() {
            document.getElementById("videoSection").style.display = "block";
        }
    </script>

</body>
</html>
